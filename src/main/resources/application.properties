spring.application.name=incubators-shop-backend

server.port=${PORT:8080}

# ===================================================
# DATABASE CONFIGURATION (Aiven Cloud MySQL)
# ===================================================
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA & Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ===================================================
# REST API EMAIL CONFIGURATION (Resend Engine)
# ===================================================
# This replaces the blocked spring.mail configurations entirely
resend.api.key=${RESEND_API_KEY}

# ===================================================
# CUSTOM APP PROPERTIES
# ===================================================
incubators.shop.admin-email=${ADMIN_EMAIL:sasivenkatgowdnda@gmail.com}
incubators.shop.frontend-url=${INCUBATORS_SHOP_FRONTEND_URL:http://localhost:5173}

# Multipart and Cloudinary Configurations remain the same...
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=1MB

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}