spring.application.name=incubators-shop-backend

server.port=${PORT:8080}

# ===================================================
# DATABASE CONFIGURATION (Aiven Cloud MySQL)
# ===================================================
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA & Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ===================================================
# EMAIL CONFIGURATION (Gmail SMTP Engine)
# ===================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# ✨ NEW: Forces a secure connection so Google doesn't block the email
spring.mail.properties.mail.smtp.starttls.required=true

# ===================================================
# CUSTOM APP PROPERTIES
# ===================================================
incubators.shop.admin-email=${MAIL_USER}
# ✨ UPDATED: Maps perfectly to the Render Environment Variable
incubators.shop.frontend-url=${INCUBATORS_SHOP_FRONTEND_URL:http://localhost:5173}

# Set a reasonable limit (e.g., 10MB). 
# Anything larger than this will be rejected by Spring BEFORE hitting your logic.
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# Let Spring buffer large files to a temp file on disk, not RAM
spring.servlet.multipart.file-size-threshold=1MB

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}